  name: 自动更新论文数据                                                 
                                                                         
  on:
    schedule:                                                            
      # 每天北京时间早上8点运行 (UTC时间0点)                        
      - cron: '0 0 * * *'
    workflow_dispatch: # 允许手动触发

  jobs:
    update-papers:
      runs-on: ubuntu-latest

      steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          pip install requests beautifulsoup4 lxml feedparser

      - name: 运行爬虫更新数据
        run: |
          python auto_update.py

      - name: 提交更新
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add papers_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m"Auto update papers"
          git push
